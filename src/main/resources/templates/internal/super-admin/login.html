<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title>Sign In</title>
</head>

<body>
<main layout:fragment="content">
    <section class="auth-shell vac-auth-shell vac-login-shell">
        <div class="vac-auth-layout reveal">
            <aside class="vac-auth-visual" aria-hidden="true">
                <div class="vac-auth-visual__media">
                    <img class="vac-auth-visual__slide vac-auth-visual__slide--one" src="/uploads/new images/Boss.jpeg" alt="Volcano Arts Center Login" />
                    <div class="vac-auth-visual__veil"></div>
                </div>
            </aside>

            <div class="auth-card vac-auth-card">
                <h1>LOGIN</h1>

                <div th:if="${param.error}" class="vac-auth-alert vac-auth-alert--error">
                    Invalid email or password. Please try again.
                </div>

                <div th:if="${param.redirect}" class="vac-auth-alert vac-auth-alert--success">
                    Sign in to continue.
                </div>

                <div th:if="${param.logout}" class="vac-auth-alert vac-auth-alert--success">
                    You have been signed out.
                </div>

                <div th:if="${param.reset}" class="vac-auth-alert vac-auth-alert--success">
                    Your password has been reset. Sign in with your new password.
                </div>

                <form th:action="@{/login}" method="post" class="vac-auth-form" id="vac-clerk-login-form">
                    <input th:if="${loginRedirect != null}" type="hidden" name="redirect" th:value="${loginRedirect}" />
                    <div class="field">
                        <label class="form-label" for="username">EMAIL</label>
                        <input class="form-input" type="text" id="username" name="username"
                               placeholder="you@example.com" required autofocus />
                    </div>

                    <div class="field">
                        <div class="vac-auth-label-row">
                            <label class="form-label" for="password">PASSWORD</label>
                            <a class="vac-auth-forgot" th:href="@{/forgot-password}">FORGOT PASSWORD?</a>
                        </div>
                        <input class="form-input" type="password" id="password" name="password"
                               placeholder="Enter your password" required />
                    </div>

                    <button type="submit" class="btn btn--primary vac-auth-submit" id="vac-clerk-login-submit">
                        SIGN IN
                    </button>
                </form>
                <div id="vac-clerk-login-error" class="vac-auth-alert vac-auth-alert--error" style="display:none"></div>

                <!-- Subtle divider and Google OAuth button -->
                <div class="vac-auth-divider">
                    <span>or continue with</span>
                </div>

                <a th:if="${clerkPublishableKey != null and !#strings.isEmpty(clerkPublishableKey)}"
                   href="#"
                   id="vac-clerk-google-login"
                   class="vac-oauth-btn">
                    <svg viewBox="0 0 48 48" width="18" height="18" aria-hidden="true">
                        <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.657 32.657 29.187 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.963 3.037l5.657-5.657C34.046 6.053 29.27 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                        <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 19.022 12 24 12c3.059 0 5.842 1.154 7.963 3.037l5.657-5.657C34.046 6.053 29.27 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                        <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.193l-6.19-5.238C29.143 35.091 26.715 36 24 36c-5.165 0-9.626-3.327-11.288-7.946l-6.522 5.025C9.504 39.556 16.688 44 24 44z"/>
                        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.79 2.237-2.231 4.166-4.084 5.569l.003-.002 6.19 5.238C36.971 39.245 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                    </svg>
                    <span>CONTINUE WITH GOOGLE</span>
                </a>

                <div class="vac-signup-options">
                    <p class="vac-signup-prompt">
                        <span>Don&rsquo;t have an account?</span>
                        <a th:href="@{/register}">Create one</a>
                    </p>
                    <div class="vac-signup-options__links">
                        <a th:href="@{/register}">CLIENT ACCOUNT</a>
                        <a th:href="@{/tour-operators/register}">TOUR OPERATOR</a>
                        <a th:href="@{/talent/register}">TALENT APPLICANT</a>
                    </div>
                </div>

            </div>
        </div>
    </section>
</main>
<script th:if="${clerkPublishableKey != null and !#strings.isEmpty(clerkPublishableKey)}"
        async crossorigin="anonymous"
        data-clerk-publishable-key="[[${clerkPublishableKey}]]"
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
<script th:if="${clerkPublishableKey != null and !#strings.isEmpty(clerkPublishableKey)}" th:inline="javascript">
    (function () {
        const redirectTo = /*[[${loginRedirect} ?: '/']]*/ '/';
        const form = document.getElementById('vac-clerk-login-form');
        const errorBox = document.getElementById('vac-clerk-login-error');
        const button = document.getElementById('vac-clerk-login-submit');
        const googleButton = document.getElementById('vac-clerk-google-login');
        const oauthSearchParam = 'clerk_oauth';

        async function exchangeActiveClerkSession() {
            await window.Clerk.load();
            if (!window.Clerk.session) {
                return false;
            }
            const token = await window.Clerk.session.getToken();
            if (!token) {
                return false;
            }
            const response = await fetch('/api/v1/auth/clerk/session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ token: token })
            });
            if (!response.ok) {
                const body = await response.json().catch(function () { return {}; });
                throw new Error(body.error || 'Could not create local session.');
            }
            window.location.assign(redirectTo || '/client/dashboard');
            return true;
        }

        if (window.location.search.indexOf(oauthSearchParam + '=1') !== -1) {
            exchangeActiveClerkSession().catch(function (error) {
                errorBox.textContent = error.message || 'Google sign in failed.';
                errorBox.style.display = 'block';
            });
        }

        if (googleButton) {
            googleButton.addEventListener('click', async function (event) {
                event.preventDefault();
                errorBox.style.display = 'none';
                try {
                    await window.Clerk.load();
                    const returnUrl = new URL(window.location.href);
                    returnUrl.searchParams.set('redirect', redirectTo || '/client/dashboard');
                    returnUrl.searchParams.set(oauthSearchParam, '1');
                    await window.Clerk.client.signIn.authenticateWithRedirect({
                        strategy: 'oauth_google',
                        redirectUrl: returnUrl.toString(),
                        redirectUrlComplete: returnUrl.toString()
                    });
                } catch (error) {
                    errorBox.textContent = error.message || 'Google sign in failed.';
                    errorBox.style.display = 'block';
                }
            });
        }

        if (!form) return;
        form.addEventListener('submit', async function (event) {
            event.preventDefault();
            errorBox.style.display = 'none';
            button.disabled = true;
            const original = button.textContent;
            button.textContent = 'Signing in...';
            try {
                await window.Clerk.load();
                const signIn = await window.Clerk.client.signIn.create({
                    identifier: form.username.value,
                    password: form.password.value
                });
                if (signIn.status !== 'complete') {
                    throw new Error('Additional verification is required. Complete it in Clerk, then try again.');
                }
                await window.Clerk.setActive({ session: signIn.createdSessionId });
                const token = await window.Clerk.session.getToken();
                const response = await fetch('/api/v1/auth/clerk/session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ token: token })
                });
                if (!response.ok) {
                    const body = await response.json().catch(function () { return {}; });
                    throw new Error(body.error || 'Could not create local session.');
                }
                window.location.assign(redirectTo || '/client/dashboard');
            } catch (error) {
                errorBox.textContent = error.message || 'Sign in failed.';
                errorBox.style.display = 'block';
                button.disabled = false;
                button.textContent = original;
            }
        });
    })();
</script>
</body>
</html>
