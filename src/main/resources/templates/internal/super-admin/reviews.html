<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin-base}">

<head>
    <title>Review Moderation</title>
</head>

<body>
<th:block layout:fragment="breadcrumb">
    <a th:href="@{/admin/dashboard}">Admin</a>
    <span class="sep">›</span>
    <span>Reviews</span>
</th:block>

<main layout:fragment="content">
    <div class="admin-page-header">
        <h1>Review Moderation</h1>
        <p class="admin-panel__sub">Approve or delete reviews submitted by users.</p>
    </div>

    <div class="admin-panel">
        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Reviewer</th>
                    <th>Rating</th>
                    <th>Comment</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${reviews}">
                    <td th:text="${#temporals.format(r.createdAt, 'MMM d, yyyy')}">Date</td>
                    <td>
                        <strong th:text="${r.reviewerName}">Name</strong><br/>
                        <small th:text="${r.reviewerEmail}">Email</small>
                    </td>
                    <td>
                        <span th:text="${r.rating} + ' / 5'">5 / 5</span>
                    </td>
                    <td>
                        <p th:text="${r.comment}" style="max-width: 400px; white-space: normal; font-size: 0.9rem;">Comment</p>
                    </td>
                    <td>
                        <span th:if="${r.approved}" class="vac-badge vac-badge--success">Approved</span>
                        <span th:unless="${r.approved}" class="vac-badge vac-badge--warning">Pending</span>
                    </td>
                    <td>
                        <div style="display: flex; gap: 0.5rem;">
                            <form th:unless="${r.approved}" th:action="@{|/admin/reviews/${r.id}/approve|}" method="post">
                                <button type="submit" class="btn btn--primary btn--sm">Approve</button>
                            </form>
                            <form th:action="@{|/admin/reviews/${r.id}/delete|}" method="post" onsubmit="return confirm('Delete this review?')">
                                <button type="submit" class="btn btn--outline btn--sm" style="color: #e74c3c; border-color: #e74c3c;">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(reviews)}">
                    <td colspan="6" style="text-align: center; padding: 3rem;">No reviews found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
