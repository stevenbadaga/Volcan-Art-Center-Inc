<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Create Client Account</title>
</head>
<body>
<main layout:fragment="content">
    <section class="auth-shell vac-auth-shell vac-client-register-shell">
        <div class="vac-auth-layout reveal">
            <aside class="vac-auth-visual" aria-hidden="true">
                <div class="vac-auth-visual__media">
                    <img class="vac-auth-visual__slide vac-auth-visual__slide--one" src="/uploads/new images/Boss 2.jpeg" alt="Client Access" />
                    <div class="vac-auth-visual__veil"></div>
                </div>
            </aside>

            <div class="auth-card vac-auth-card">
                <span class="eyebrow vac-auth-eyebrow">VOLCANO ARTS CLIENT ACCESS</span>
                <h1>CREATE ACCOUNT</h1>
                <p class="auth-card__sub">Register to continue your art collection, experiences, and inbox conversations with the Volcano Arts team.</p>

                <div th:if="${successMessage}" class="vac-auth-alert vac-auth-alert--success" th:text="${successMessage}"></div>

                <form th:action="@{/register}" method="post" class="vac-auth-form" id="vac-clerk-register-form">
                    <div class="form-row">
                        <div class="field">
                            <label class="form-label">FIRST NAME *</label>
                            <input class="form-input" name="firstName" placeholder="e.g. Aline" required />
                        </div>
                        <div class="field">
                            <label class="form-label">LAST NAME *</label>
                            <input class="form-input" name="lastName" placeholder="e.g. Uwimana" required />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="field">
                            <label class="form-label">EMAIL ADDRESS *</label>
                            <input class="form-input" name="email" type="email" placeholder="you@example.com" required />
                        </div>
                        <div class="field">
                            <label class="form-label">PHONE</label>
                            <input class="form-input" name="phone" type="tel" placeholder="+250 7xx xxx xxx" />
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="field">
                            <label class="form-label">COUNTRY</label>
                            <input class="form-input" name="country" placeholder="Rwanda" value="Rwanda" />
                        </div>
                        <div class="field">
                            <label class="form-label">PASSWORD *</label>
                            <input class="form-input" name="password" type="password" minlength="8" placeholder="Minimum 8 characters" required />
                            <small class="vac-field-hint">Use at least 8 characters with letters &amp; numbers.</small>
                        </div>
                    </div>
                    <button class="btn btn--primary vac-auth-submit" type="submit" id="vac-clerk-register-submit">CREATE CLIENT ACCOUNT</button>
                </form>
                <div id="vac-clerk-register-error" class="vac-auth-alert vac-auth-alert--error" style="display:none"></div>

                <!-- Subtle divider and Google OAuth button -->
                <div class="vac-auth-divider">
                    <span>or continue with</span>
                </div>

                <a th:if="${clerkPublishableKey != null and !#strings.isEmpty(clerkPublishableKey)}"
                   href="#"
                   id="vac-clerk-google-register"
                   class="vac-oauth-btn">
                    <svg viewBox="0 0 48 48" width="18" height="18" aria-hidden="true">
                        <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.657 32.657 29.187 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.963 3.037l5.657-5.657C34.046 6.053 29.27 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                        <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 19.022 12 24 12c3.059 0 5.842 1.154 7.963 3.037l5.657-5.657C34.046 6.053 29.27 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                        <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.193l-6.19-5.238C29.143 35.091 26.715 36 24 36c-5.165 0-9.626-3.327-11.288-7.946l-6.522 5.025C9.504 39.556 16.688 44 24 44z"/>
                        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.79 2.237-2.231 4.166-4.084 5.569l.003-.002 6.19 5.238C36.971 39.245 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                    </svg>
                    <span>CONTINUE WITH GOOGLE</span>
                </a>

                <p class="vac-client-register__sign-in">
                    ALREADY HAVE AN ACCOUNT? <a th:href="@{/login}">SIGN IN</a>
                </p>

                <p class="vac-auth-backlink">
                    <a th:href="@{/}">← RETURN TO WEBSITE</a>
                </p>
            </div>
        </div>
    </section>
</main>
<script th:if="${clerkPublishableKey != null and !#strings.isEmpty(clerkPublishableKey)}"
        async crossorigin="anonymous"
        data-clerk-publishable-key="[[${clerkPublishableKey}]]"
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
<script th:if="${clerkPublishableKey != null and !#strings.isEmpty(clerkPublishableKey)}">
    (function () {
        const form = document.getElementById('vac-clerk-register-form');
        const errorBox = document.getElementById('vac-clerk-register-error');
        const button = document.getElementById('vac-clerk-register-submit');
        const googleButton = document.getElementById('vac-clerk-google-register');
        const redirectTo = '/client/dashboard';
        if (!form) return;
        async function exchangeActiveClerkSession() {
            await window.Clerk.load();
            if (!window.Clerk.session) {
                return false;
            }
            const token = await window.Clerk.session.getToken();
            if (!token) {
                return false;
            }
            const response = await fetch('/api/v1/auth/clerk/session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ token: token })
            });
            if (!response.ok) {
                const body = await response.json().catch(function () { return {}; });
                throw new Error(body.error || 'Could not create local session.');
            }
            window.location.assign(redirectTo);
            return true;
        }
        if (window.location.search.indexOf('clerk_oauth=1') !== -1) {
            exchangeActiveClerkSession().catch(function (error) {
                if (errorBox) {
                    errorBox.textContent = error.message || 'Google sign in failed.';
                    errorBox.style.display = 'block';
                }
            });
        }
        if (googleButton) {
            googleButton.addEventListener('click', async function (event) {
                event.preventDefault();
                try {
                    await window.Clerk.load();
                    const returnUrl = new URL(window.location.href);
                    returnUrl.searchParams.set('clerk_oauth', '1');
                    await window.Clerk.client.signIn.authenticateWithRedirect({
                        strategy: 'oauth_google',
                        redirectUrl: returnUrl.toString(),
                        redirectUrlComplete: returnUrl.toString()
                    });
                } catch (error) {
                    if (errorBox) {
                        errorBox.textContent = error.message || 'Google sign in failed.';
                        errorBox.style.display = 'block';
                    }
                }
            });
        }
        form.addEventListener('submit', async function () {
            button.disabled = true;
            button.textContent = 'Creating account...';
        });
    })();
</script>
</body>
</html>
