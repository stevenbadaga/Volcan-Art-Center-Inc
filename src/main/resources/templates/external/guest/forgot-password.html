<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Reset Password — Volcano Arts Center</title></head>
<body>
<main layout:fragment="content" class="vac-forgot">
    <section class="vac-forgot-shell">
        <div class="vac-forgot-card reveal">
            <span class="vac-eyebrow">Account recovery</span>
            <h1>Reset your password</h1>
            <p>Enter the email address linked to your account and our team will send you reset instructions.</p>

            <div th:if="${successMessage}" class="vac-auth-notice" th:text="${successMessage}"></div>

            <form th:action="@{/forgot-password}" method="post" class="vac-forgot-form">
                <div class="form-group">
                    <label class="form-label">Email address</label>
                    <input class="form-input" type="email" name="email" placeholder="you@example.com" required autofocus />
                </div>
                <input type="hidden" name="captchaToken" value="skip_for_now" />
                <button class="btn btn--primary" type="submit">Send reset instructions</button>
            </form>

            <p class="vac-forgot-back"><a th:href="@{/login}">← Back to sign in</a></p>
        </div>
    </section>
</main>
</body>
</html>
