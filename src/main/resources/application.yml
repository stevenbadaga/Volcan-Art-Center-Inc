# ── Volcano Arts Center Platform ──
# Application configuration with dev/prod profiles

spring:
  application:
    name: Volcano Arts Center Platform
  profiles:
    default: local

  # ── Thymeleaf ──
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: false

  # ── Static resources ──
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 0

  # ── File upload limits (for art images) ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # ── Redis (cache, sessions, idempotency, rate-limit) ──
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2s
      connect-timeout: 2s
      repositories:
        enabled: false

  # ── HTTP session (default: servlet, PRD overrides with Redis) ──
  session:
    store-type: none
    timeout: 30m

  # ── Cache abstraction: Caffeine in-process by default; @Cacheable on Redis-backed methods uses RedisCacheManager when chosen explicitly ──
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=1h

# ── AWS S3 (Phase 4 Media) ──
aws:
  s3:
    region: ${AWS_REGION:us-east-1}
    bucket-name: ${AWS_S3_BUCKET:volcano-arts-media}
    access-key: ${AWS_ACCESS_KEY:mock_access_key}
    secret-key: ${AWS_SECRET_KEY:mock_secret_key}

# ── Server ──
server:
  port: 8080
  error:
    whitelabel:
      enabled: false
  forward-headers-strategy: framework

# ── Actuator (locked down per-profile; SecurityConfig restricts access) ──
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ── Logging ──
logging:
  level:
    root: INFO
    com.volcanoartscenter: DEBUG
    org.springframework.security: INFO

platform:
  security:
    force-https: false
    oauth:
      google:
        client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
        client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
        redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
    # ── Partner JWT (RS256, /api/v1/partner/**) ──
    jwt:
      issuer: ${PARTNER_JWT_ISSUER:https://volcanoartscenter.rw}
      audience: ${PARTNER_JWT_AUDIENCE:volcano-partner-api}
      key-id: ${PARTNER_JWT_KEY_ID:partner-jwt-key}
      access-token-ttl-minutes: ${PARTNER_JWT_TTL_MINUTES:60}
      private-key: ${PARTNER_JWT_PRIVATE_KEY:}
      public-key: ${PARTNER_JWT_PUBLIC_KEY:}
  captcha:
    enabled: false
    provider: hcaptcha
    verify-url: ${HCAPTCHA_VERIFY_URL:https://hcaptcha.com/siteverify}
    secret: ${HCAPTCHA_SECRET:}
    storage:
      local-upload-dir: ${LOCAL_UPLOAD_DIR:${user.home}/.volcano-platform/uploads}
  site:
    whatsapp-number: ${SITE_WHATSAPP_NUMBER:250788883986}
    contact-email: ${SITE_CONTACT_EMAIL:hello@volcanoartsandhospes.com}
    site-url: ${SITE_URL:https://volcanoartscenter.rw}
    inquiry-message: ${SITE_INQUIRY_MESSAGE:Hello Volcano Arts Center! I would like to inquire about your artworks, experiences, and cultural collections.}
    social:
      youtube: ${SITE_SOCIAL_YOUTUBE:}
      twitter: ${SITE_SOCIAL_TWITTER:}
      instagram: ${SITE_SOCIAL_INSTAGRAM:}
      facebook: ${SITE_SOCIAL_FACEBOOK:}
  s3:
    enabled: false
    bucket: ${S3_BUCKET:}
    region: ${S3_REGION:}
    cdnBaseUrl: ${CDN_BASE_URL:}
  monitoring:
    backup:
      enabled: false
      cron: "0 0 2 * * *"
  notifications:
    email:
      enabled: ${EMAIL_NOTIFICATIONS_ENABLED:true}
      from: noreply@volcanoartscenter.rw
    whatsapp:
      enabled: ${WHATSAPP_NOTIFICATIONS_ENABLED:false}
      businessNumber: ""
    sms:
      enabled: ${SMS_NOTIFICATIONS_ENABLED:false}
    retry:
      enabled: true
      max-attempts: 5
      base-delay-seconds: 60
      max-delay-seconds: 3600
      interval-ms: 60000
      initial-delay-ms: 30000
      batch-size: 25
  integrations:
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    mtn:
      base-url: ${MTN_MOMO_BASE_URL:}
      api-user-id: ${MTN_MOMO_API_USER_ID:}
      api-key: ${MTN_MOMO_API_KEY:}
      subscription-key: ${MTN_MOMO_SUBSCRIPTION_KEY:}
      target-environment: ${MTN_MOMO_TARGET_ENV:sandbox}
      currency: ${MTN_MOMO_CURRENCY:EUR}
      callback-url: ${MTN_MOMO_CALLBACK_URL:}
    bank:
      account-name: ${BANK_ACCOUNT_NAME:Volcano Arts Center Inc.}
      account-number: ${BANK_ACCOUNT_NUMBER:}
      bank-name: ${BANK_NAME:}
      swift: ${BANK_SWIFT:}
      iban: ${BANK_IBAN:}
    airtel:
      base-url: ${AIRTEL_MONEY_BASE_URL:}
      client-id: ${AIRTEL_MONEY_CLIENT_ID:}
      client-secret: ${AIRTEL_MONEY_CLIENT_SECRET:}
    fedex:
      base-url: ${FEDEX_BASE_URL:}
      api-key: ${FEDEX_API_KEY:}
      api-secret: ${FEDEX_API_SECRET:}
      account-number: ${FEDEX_ACCOUNT_NUMBER:}
    email:
      api-url: ${EMAIL_API_URL:}
      api-key: ${EMAIL_API_KEY:}
    whatsapp:
      api-url: ${WHATSAPP_API_URL:}
      api-token: ${WHATSAPP_API_TOKEN:}
      phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    sms:
      africas-talking:
        api-url: ${AT_API_URL:https://api.africastalking.com/version1/messaging}
        api-key: ${AT_API_KEY:}
        username: ${AT_USERNAME:}
        sender-id: ${AT_SENDER_ID:}
    resend:
      api-url: ${RESEND_API_URL:https://api.resend.com/emails}
      api-key: ${RESEND_API_KEY:}
      mail-from: ${MAIL_FROM:noreply@volcanoartscenter.rw}
  # ── Idempotency (PRD §3 Module 3) ──
  idempotency:
    enabled: true
    ttl-hours: 24
    redis-namespace: volcano:idem
  # ── Rate limit policies (PRD §7) ──
  rate-limits:
    enabled: true
    redis-namespace: volcano:rl
    policies:
      login: { capacity: 5, refill-tokens: 5, refill-period: 15m }
      register: { capacity: 3, refill-tokens: 3, refill-period: 1h }
      password-reset: { capacity: 3, refill-tokens: 3, refill-period: 1h }
      contact-form: { capacity: 3, refill-tokens: 3, refill-period: 1h }
      talent-form: { capacity: 2, refill-tokens: 2, refill-period: 1h }
      public-api: { capacity: 200, refill-tokens: 200, refill-period: 10m }
      authenticated-api: { capacity: 1000, refill-tokens: 1000, refill-period: 10m }
      payment-init: { capacity: 5, refill-tokens: 5, refill-period: 1h }
  # ── JWT (only used on /api/v1/partner and webhooks; web UI uses sessions) ──
  jwt:
    issuer: volcano-arts-center
    access-token-ttl: ${JWT_ACCESS_TOKEN_EXPIRY:900}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_EXPIRY:2592000}
    private-key: ${JWT_PRIVATE_KEY:}
    public-key: ${JWT_PUBLIC_KEY:}

---
# ═══════════════════════════════════════
# LOCAL profile (default)
# Flyway is now authoritative everywhere (PRD §14). ddl-auto: validate guarantees
# entity-schema drift fails fast at startup.
# ═══════════════════════════════════════
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/volcano_platform}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:1930}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  session:
    store-type: none

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, env, beans, mappings, loggers
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.volcanoartscenter: DEBUG
    org.hibernate.SQL: DEBUG

platform:
  rate-limits:
    enabled: false
  idempotency:
    enabled: false

---
# ═══════════════════════════════════════
# DEV profile (staging-like — Flyway authoritative)
# ═══════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      url: ${REDIS_URL}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

  thymeleaf:
    cache: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

logging:
  level:
    com.volcanoartscenter: INFO

---
# ═══════════════════════════════════════
# PROD profile
# ═══════════════════════════════════════
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1200000

  data:
    redis:
      url: ${REDIS_URL}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: false

  thymeleaf:
    cache: true

  session:
    timeout: 30m

server:
  forward-headers-strategy: framework
  tomcat:
    max-threads: 200

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.volcanoartscenter: INFO

platform:
  security:
    force-https: true
